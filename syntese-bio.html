<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syntese Suplementos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 2.5rem 1.25rem 3rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(30,100,255,0.10) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(30,100,255,0.5);
    overflow: hidden;
    margin-bottom: 1.1rem;
    box-shadow: 0 0 32px rgba(30,100,255,0.18);
    flex-shrink: 0;
  }

  .logo-ring img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 5px;
    color: #ffffff;
    text-transform: uppercase;
    margin-bottom: 3px;
    text-align: center;
  }

  .sub {
    font-size: 10px;
    letter-spacing: 3.5px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }

  .tagline {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1.8rem;
    text-align: center;
    font-style: italic;
  }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, #1e64ff, transparent);
    margin-bottom: 1.8rem;
  }

  .cta-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 1rem;
    text-align: center;
  }

  .btn-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(30,100,255,0.35);
    border-radius: 14px;
    text-decoration: none;
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, border-color 0.2s, transform 0.12s;
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 0.5px;
    background: linear-gradient(90deg, transparent, rgba(30,100,255,0.6), transparent);
  }

  .btn:hover {
    background: rgba(30,100,255,0.09);
    border-color: rgba(30,100,255,0.65);
    transform: translateY(-2px);
  }

  .btn:active { transform: scale(0.98); }

  .wpp-icon {
    width: 46px; height: 46px; min-width: 46px;
    border-radius: 50%;
    background: #25d366;
    display: flex; align-items: center; justify-content: center;
  }

  .wpp-icon svg { width: 24px; height: 24px; fill: #fff; }

  .btn-text { flex: 1; }

  .btn-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .btn-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 1px;
  }

  .footer {
    margin-top: 2.5rem;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
